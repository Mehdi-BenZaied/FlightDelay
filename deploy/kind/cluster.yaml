apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster

nodes:
  - role: control-plane

    extraPortMappings:
      - containerPort: 30080
        hostPort: 8081
        listenAddress: "127.0.0.1"
        protocol: TCP

      - containerPort: 30085
        hostPort: 8051
        listenAddress: "127.0.0.1"
        protocol: TCP
