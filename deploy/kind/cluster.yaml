kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane

    extraPortMappings:
      # Frontend
      - containerPort: 30080
        hostPort: 8081
        listenAddress: "127.0.0.1"
        protocol: TCP

      # Analytics
      - containerPort: 30085
        hostPort: 8051
        listenAddress: "127.0.0.1"
        protocol: TCP

      # Grafana
      - containerPort: 30030
        hostPort: 3000
        listenAddress: "127.0.0.1"
        protocol: TCP
