apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flight-delay.fullname" . }}-redis
  labels:
    {{- include "flight-delay.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: {{ .Values.redis.replicaCount }}

  strategy:
    type: Recreate

  selector:
    matchLabels:
      {{- include "flight-delay.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis

  template:
    metadata:
      labels:
        {{- include "flight-delay.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis

    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}

          args:
            - redis-server
            - --appendonly
            - "yes"

          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.port }}
              protocol: TCP

          startupProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}

          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          {{- if .Values.redis.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "flight-delay.fullname" . }}-redis-data
          {{- else }}
          emptyDir: {}
          {{- end }}