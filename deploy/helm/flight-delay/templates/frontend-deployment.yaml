apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flight-delay.fullname" . }}-frontend
  labels:
    {{- include "flight-delay.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}

  selector:
    matchLabels:
      {{- include "flight-delay.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend

  template:
    metadata:
      labels:
        {{- include "flight-delay.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend

      {{- with .Values.frontend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.frontend.containerPort }}
              protocol: TCP

          startupProbe:
            httpGet:
              path: {{ .Values.frontend.healthPath }}
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: {{ .Values.frontend.healthPath }}
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: {{ .Values.frontend.healthPath }}
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}