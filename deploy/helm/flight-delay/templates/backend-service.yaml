apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "flight-delay.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}

  selector:
    {{- include "flight-delay.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend

  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP

      {{- if eq .Values.backend.service.type "NodePort" }}
      nodePort: {{ .Values.backend.service.nodePort }}
      {{- end }}
