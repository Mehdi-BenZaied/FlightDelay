name: flight-delay-ai

services:
  redis:
    image: redis:7-alpine

    command:
      - redis-server
      - --appendonly
      - "yes"

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

    restart: unless-stopped

    networks:
      - flight-delay-network

  backend:
    image: ${BACKEND_REF:-flight-delay-backend:local}

    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime

    environment:
      PORT: "5000"
      FLASK_DEBUG: "false"

      API_V1_STR: "/api/v1"

      SECRET_KEY: ${SECRET_KEY:-development-secret-change-me}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}

      MODEL_PATH: "/app/ml/models/v1_model.json"
      FLIGHT_DATA_PATH: "/app/datasets/flight_data.csv"

      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"

      DATABASE_URL: "sqlite:////app/data/flight_delay.db"
      SQLALCHEMY_DATABASE_URI: "sqlite:////app/data/flight_delay.db"

    command:
      - python
      - run.py

    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"

    volumes:
      - backend_data:/app/data

    depends_on:
      redis:
        condition: service_healthy

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl --fail --silent --show-error
          http://127.0.0.1:5000/health
          > /dev/null
          || exit 1
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

    restart: unless-stopped

    networks:
      - flight-delay-network

  analytics:
    image: ${BACKEND_REF:-flight-delay-backend:local}

    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime

    environment:
      FLASK_DEBUG: "false"

      SECRET_KEY: ${SECRET_KEY:-development-secret-change-me}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}

      MODEL_PATH: "/app/ml/models/v1_model.json"
      FLIGHT_DATA_PATH: "/app/datasets/flight_data.csv"

      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"

      DATABASE_URL: "sqlite:////app/data/flight_delay.db"
      SQLALCHEMY_DATABASE_URI: "sqlite:////app/data/flight_delay.db"

    command:
      - python
      - analytics.py

    ports:
      - "${ANALYTICS_HOST_PORT:-8050}:8050"

    volumes:
      - backend_data:/app/data

    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl --fail --silent --show-error
          http://127.0.0.1:8050/
          > /dev/null
          || exit 1
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

    restart: unless-stopped

    networks:
      - flight-delay-network

  frontend:
    image: ${FRONTEND_REF:-flight-delay-frontend:local}

    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime

    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget
          --quiet
          --tries=1
          --output-document=/dev/null
          http://127.0.0.1/health
          || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

    restart: unless-stopped

    networks:
      - flight-delay-network

volumes:
  backend_data:
  redis_data:

networks:
  flight-delay-network:
    driver: bridge