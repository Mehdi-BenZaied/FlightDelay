apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flight-delay

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - storage.yaml
  - redis.yaml
  - backend.yaml
  - analytics.yaml
  - frontend.yaml

images:
  - name: mehdibenzaied/flight-delay-backend
    newTag: main-latest

  - name: mehdibenzaied/flight-delay-frontend
    newTag: main-latest