apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: flight-delay
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: backend

  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: flight-delay
    spec:
      containers:
        - name: backend
          image: mehdibenzaied/flight-delay-backend:main-b21-ca2d8837
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 5000

          envFrom:
            - configMapRef:
                name: flight-delay-config

            # This Secret is optional for the first local deployment.
            - secretRef:
                name: flight-delay-secrets
                optional: true

          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 36

          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

          volumeMounts:
            - name: backend-data
              mountPath: /app/data

      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: backend-data

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: flight-delay
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 5000
      targetPort: http