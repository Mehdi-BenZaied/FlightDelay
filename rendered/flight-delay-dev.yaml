# Source: flight-delay/templates/analytics-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-delay-dev-analytics
  labels:
    helm.sh/chart: flight-delay-0.1.0
    app.kubernetes.io/name: flight-delay
    app.kubernetes.io/instance: flight-delay-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: analytics
spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: flight-delay
      app.kubernetes.io/instance: flight-delay-dev
      app.kubernetes.io/component: analytics

  template:
    metadata:
      labels:
        app.kubernetes.io/name: flight-delay
        app.kubernetes.io/instance: flight-delay-dev
        app.kubernetes.io/component: analytics

    spec:
      imagePullSecrets:
        - name: dockerhub-credentials

      containers:
        - name: analytics
          image: "mehdibenzaied/flight-delay-backend:main-latest"
          imagePullPolicy: Always
          command:
            - python
            - analytics.py

          ports:
            - name: http
              containerPort: 8050
              protocol: TCP

          envFrom:
            - configMapRef:
                name: flight-delay-dev-config

          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60

          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
---
# Source: flight-delay/templates/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-delay-dev-backend
  labels:
    helm.sh/chart: flight-delay-0.1.0
    app.kubernetes.io/name: flight-delay
    app.kubernetes.io/instance: flight-delay-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: backend
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: flight-delay
      app.kubernetes.io/instance: flight-delay-dev
      app.kubernetes.io/component: backend

  template:
    metadata:
      labels:
        app.kubernetes.io/name: flight-delay
        app.kubernetes.io/instance: flight-delay-dev
        app.kubernetes.io/component: backend

    spec:
      imagePullSecrets:
        - name: dockerhub-credentials

      containers:
        - name: backend
          image: "mehdibenzaied/flight-delay-backend:main-latest"
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: flight-delay-dev-config

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60

          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi

          volumeMounts:
            - name: backend-data
              mountPath: /app/data

      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: flight-delay-dev-backend-data
