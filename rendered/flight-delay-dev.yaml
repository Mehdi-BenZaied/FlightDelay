apiVersion: v1
kind: ConfigMap
metadata:
  name: flight-delay-dev-config
  labels:
    helm.sh/chart: flight-delay-0.1.0
    app.kubernetes.io/name: flight-delay
    app.kubernetes.io/instance: flight-delay-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
data:
  PORT: "5000"
  FLASK_DEBUG: "false"
  API_V1_STR: "/api/v1"

  MODEL_PATH: "/app/ml/models/v1_model.json"
  FLIGHT_DATA_PATH: "/app/datasets/flight_data.csv"

  REDIS_HOST: "flight-delay-dev-redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  DATABASE_URL: "sqlite:////app/data/flight_delay.db"
  SQLALCHEMY_DATABASE_URI: "sqlite:////app/data/flight_delay.db"
