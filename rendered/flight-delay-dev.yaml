---
# Source: flight-delay/templates/redis-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-delay-dev-redis
  labels:
    helm.sh/chart: flight-delay-0.1.0
    app.kubernetes.io/name: flight-delay
    app.kubernetes.io/instance: flight-delay-dev
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: redis
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: flight-delay
      app.kubernetes.io/instance: flight-delay-dev
      app.kubernetes.io/component: redis

  template:
    metadata:
      labels:
        app.kubernetes.io/name: flight-delay
        app.kubernetes.io/instance: flight-delay-dev
        app.kubernetes.io/component: redis

    spec:
      containers:
        - name: redis
          image: "redis:7-alpine"
          imagePullPolicy: IfNotPresent

          args:
            - redis-server
            - --appendonly
            - "yes"

          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP

          startupProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi

          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: flight-delay-dev-redis-data
